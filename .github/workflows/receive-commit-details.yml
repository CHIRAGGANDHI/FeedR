name: Receive Commit Details

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Source commit SHA'
        required: true
        type: string
      commit_message:
        description: 'Commit message'
        required: true
        type: string
      commit_author:
        description: 'Commit author name'
        required: true
        type: string
      commit_email:
        description: 'Commit author email'
        required: true
        type: string
      commit_url:
        description: 'Commit URL'
        required: true
        type: string
      source_repo:
        description: 'Source repository'
        required: true
        type: string
      source_branch:
        description: 'Source branch'
        required: true
        type: string
  repository_dispatch:
    types: [commit-received]

jobs:
  process-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run commit processor script
        run: bash .github/scripts/process_commit.sh
