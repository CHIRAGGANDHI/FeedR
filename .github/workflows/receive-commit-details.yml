name: Receive Commit Details

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Source commit SHA'
        required: true
        type: string
      commit_message:
        description: 'Commit message'
        required: true
        type: string
      commit_author:
        description: 'Commit author name'
        required: true
        type: string
      commit_email:
        description: 'Commit author email'
        required: true
        type: string
      commit_url:
        description: 'Commit URL'
        required: true
        type: string
      source_repo:
        description: 'Source repository'
        required: true
        type: string
      source_branch:
        description: 'Source branch'
        required: true
        type: string
  repository_dispatch:
    types: [commit-received]

jobs:
  process-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process commit details (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "=== Received Commit Details ==="
          echo "Source Repository: ${{ inputs.source_repo }}"
          echo "Source Branch: ${{ inputs.source_branch }}"
          echo "Commit SHA: ${{ inputs.commit_sha }}"
          echo "Commit Author: ${{ inputs.commit_author }} <${{ inputs.commit_email }}>"
          echo "Commit Message: ${{ inputs.commit_message }}"
          echo "Commit URL: ${{ inputs.commit_url }}"
          echo "================================"

      - name: Process commit details (repository_dispatch)
        if: github.event_name == 'repository_dispatch'
        run: |
          echo "=== Received Commit Details (Repository Dispatch) ==="
          echo "Source Repository: ${{ github.event.client_payload.source_repo }}"
          echo "Source Branch: ${{ github.event.client_payload.source_branch }}"
          echo "Commit SHA: ${{ github.event.client_payload.commit_sha }}"
          echo "Commit Author: ${{ github.event.client_payload.commit_author }} <${{ github.event.client_payload.commit_email }}>"
          echo "Commit Message: ${{ github.event.client_payload.commit_message }}"
          echo "Commit URL: ${{ github.event.client_payload.commit_url }}"
          echo "======================================================"

      - name: Example: Create comment or notification
        run: |
          # You can add custom logic here, e.g.:
          # - Create a pull request
          # - Update a status check
          # - Send a notification
          # - Update a database
          # - Trigger additional jobs
          
          echo "Processing commit from external repository..."
          echo "Add your custom logic here!"

      - name: Example: Log to file
        run: |
          mkdir -p logs
          cat >> logs/commits.log <<EOF
          Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          Source Repo: ${{ github.event_name == 'workflow_dispatch' && inputs.source_repo || github.event.client_payload.source_repo }}
          Commit SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_sha || github.event.client_payload.commit_sha }}
          EOF
          
          cat logs/commits.log
